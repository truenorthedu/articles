<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chalk &amp; Ivy — A History of British Boarding Schools</title>
<style>
  :root {
    --ink: #1d1a17;
    --parchment: #f3ead7;
    --parchment-2: #e9dcc0;
    --gold: #b8893b;
    --gold-soft: #d8b066;
    --crimson: #7c1f2b;
    --crimson-soft: #a8404c;
    --ivy: #2f4734;
    --slate: #3a4350;
    --paper-shadow: rgba(40, 30, 15, 0.25);
    --accent: var(--crimson);
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #fff8ea 0%, transparent 60%),
      radial-gradient(900px 700px at -10% 110%, #efe2c6 0%, transparent 55%),
      var(--parchment);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- Header ---------- */
  header.site {
    text-align: center;
    padding: 30px 20px 10px;
    position: relative;
  }
  .crest {
    width: 64px; height: 64px; margin: 0 auto 8px;
    display: block;
  }
  header.site h1 {
    margin: 0;
    font-size: clamp(28px, 5vw, 52px);
    letter-spacing: 0.5px;
    color: var(--ink);
    text-shadow: 0 1px 0 #fff8, 0 2px 6px var(--paper-shadow);
  }
  header.site h1 .amp { color: var(--gold); font-style: italic; }
  header.site .tagline {
    margin: 6px 0 0;
    font-style: italic;
    color: var(--slate);
    font-size: clamp(13px, 2vw, 17px);
  }
  .rule {
    width: min(680px, 86%);
    height: 2px; margin: 16px auto 0;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ---------- Timeline rail ---------- */
  .rail-wrap {
    position: relative;
    margin: 18px 0 8px;
    padding: 8px 0 18px;
  }
  .rail-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    padding: 10px 5vw 20px;
  }
  .rail-scroll::-webkit-scrollbar { height: 8px; }
  .rail-scroll::-webkit-scrollbar-thumb { background: var(--gold-soft); border-radius: 8px; }
  .rail {
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 0;
    min-width: max-content;
    padding-top: 22px;
  }
  .rail::before {
    content: "";
    position: absolute;
    top: 34px; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-soft), var(--gold), var(--gold-soft));
    border-radius: 3px;
    z-index: 0;
  }
  .node {
    position: relative;
    z-index: 1;
    width: 150px;
    flex: 0 0 150px;
    text-align: center;
    background: none; border: none;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink);
    padding: 0 4px;
  }
  .node .dot {
    width: 22px; height: 22px;
    margin: 2px auto 0;
    border-radius: 50%;
    background: var(--parchment);
    border: 3px solid var(--gold);
    box-shadow: 0 2px 5px var(--paper-shadow);
    transition: transform .25s ease, background .25s ease, border-color .25s ease;
  }
  .node .yr {
    display: block;
    margin-top: 8px;
    font-weight: 700;
    font-size: 15px;
    color: var(--crimson);
  }
  .node .lbl {
    display: block;
    margin-top: 2px;
    font-size: 12px;
    line-height: 1.25;
    color: var(--slate);
    min-height: 30px;
  }
  .node:hover .dot { transform: scale(1.18); background: var(--gold-soft); }
  .node.active .dot {
    background: var(--crimson);
    border-color: var(--crimson);
    transform: scale(1.35);
    box-shadow: 0 0 0 4px rgba(124,31,43,.18), 0 3px 8px var(--paper-shadow);
  }
  .node.active .yr { color: var(--ink); }

  /* ---------- Stage ---------- */
  .stage {
    width: min(1080px, 94%);
    margin: 6px auto 60px;
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 0;
    background: linear-gradient(180deg, #fffaf0, var(--parchment));
    border: 1px solid #d9c79e;
    border-radius: 14px;
    box-shadow: 0 18px 50px var(--paper-shadow), inset 0 0 0 6px #fff6;
    overflow: hidden;
    min-height: 460px;
  }
  .panel-text {
    padding: 30px 32px 34px;
    border-right: 1px dashed #d8c39a;
    display: flex;
    flex-direction: column;
  }
  .era-kicker {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
  }
  .era-title {
    margin: 6px 0 2px;
    font-size: clamp(24px, 3.4vw, 36px);
    line-height: 1.05;
  }
  .era-years {
    font-style: italic;
    color: var(--slate);
    margin-bottom: 14px;
  }
  .era-body { font-size: 16px; line-height: 1.55; color: #2c2620; }
  .era-body p { margin: 0 0 12px; }
  blockquote.era-quote {
    margin: 6px 0 0;
    padding: 14px 18px;
    border-left: 4px solid var(--crimson);
    background: #fff7e8;
    font-style: italic;
    font-size: 16px;
    color: #43352a;
    border-radius: 0 8px 8px 0;
  }
  blockquote.era-quote cite {
    display: block;
    margin-top: 8px;
    font-style: normal;
    font-size: 13px;
    color: var(--gold);
    font-weight: 700;
  }
  .facts {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    font-size: 12px;
    background: var(--parchment-2);
    border: 1px solid #d2bd92;
    color: #4a3f2c;
    padding: 4px 10px;
    border-radius: 999px;
  }

  .panel-scene {
    position: relative;
    background:
      radial-gradient(120% 90% at 50% 0%, #fff6e2 0%, transparent 60%),
      var(--parchment-2);
    display: flex;
    align-items: stretch;
  }
  .panel-scene svg { width: 100%; height: 100%; display: block; }
  .scene-caption {
    position: absolute;
    left: 14px; bottom: 12px;
    font-size: 12px; font-style: italic;
    color: #5a4a31;
    background: #fff8ea99;
    padding: 4px 10px;
    border-radius: 8px;
    backdrop-filter: blur(2px);
  }

  /* ---------- Controls ---------- */
  .controls {
    width: min(1080px, 94%);
    margin: -42px auto 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .nav-btn {
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
    background: var(--ink);
    color: var(--parchment);
    border: none;
    padding: 11px 18px;
    border-radius: 10px;
    box-shadow: 0 6px 14px var(--paper-shadow);
    transition: transform .15s ease, background .2s ease;
  }
  .nav-btn:hover { background: var(--crimson); transform: translateY(-2px); }
  .nav-btn:disabled { opacity: .35; cursor: default; transform: none; background: var(--slate); }
  .counter { font-style: italic; color: var(--slate); font-size: 14px; }

  footer.site {
    text-align: center;
    padding: 0 20px 50px;
    color: #6b5c44;
    font-size: 13px;
    font-style: italic;
  }

  .stage.swapping .panel-text > *, .stage.swapping .panel-scene { animation: fade .45s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px);} to {opacity:1; transform:none;} }

  @media (max-width: 760px) {
    .stage { grid-template-columns: 1fr; }
    .panel-text { border-right: none; border-bottom: 1px dashed #d8c39a; }
    .panel-scene { min-height: 280px; }
    .controls { margin-top: 18px; }
  }

  /* ===== Shared scene animations ===== */
  @keyframes flicker { 0%,100%{opacity:1;transform:scaleY(1);} 45%{opacity:.7;transform:scaleY(.86) translateX(.5px);} 70%{opacity:.95;transform:scaleY(1.05);} }
  @keyframes sway { 0%,100%{transform:rotate(-2deg);} 50%{transform:rotate(3deg);} }
  @keyframes drift { from{transform:translateX(0);} to{transform:translateX(40px);} }
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes dash { to { stroke-dashoffset: -28; } }
  @keyframes pulse { 0%,100%{opacity:.5;} 50%{opacity:1;} }
  @keyframes fall { 0%{transform:translateY(-20px);opacity:0;} 15%{opacity:1;} 100%{transform:translateY(220px);opacity:0;} }
  @keyframes wave { 0%,100%{transform:skewX(0);} 50%{transform:skewX(-7deg);} }
</style>
</head>
<body>

<header class="site">
  <svg class="crest" viewBox="0 0 64 64" aria-hidden="true">
    <path d="M32 3l24 8v18c0 16-11 27-24 32C19 56 8 45 8 29V11z" fill="#7c1f2b" stroke="#b8893b" stroke-width="2"/>

<div class="rail-wrap">

</div>

<footer class="site">

const counter = document.getElementById("counter");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
let current = 0;

eras.forEach((era, i) => {
  const node = document.createElement("button");
  node.className = "node";
  node.setAttribute("aria-label", era.year + " — " + era.short);
  node.innerHTML = `<span class="dot"></span><span class="yr">${era.year}</span><span class="lbl">${era.short}</span>`;
  node.addEventListener("click", () => select(i));
  rail.appendChild(node);
});
const nodes = [...rail.querySelectorAll(".node")];

function select(i) {
  current = Math.max(0, Math.min(eras.length - 1, i));
  const era = eras[current];

  nodes.forEach((n, k) => n.classList.toggle("active", k === current));

  panelText.innerHTML = `
    <div class="era-kicker">${era.kicker}</div>
    <h2 class="era-title">${era.title}</h2>
    <div class="era-years">${era.years}</div>
    <div class="era-body">${era.body.map(p => `<p>${p}</p>`).join("")}</div>
    <blockquote class="era-quote">&ldquo;${era.quote.text}&rdquo;<cite>${era.quote.cite}</cite></blockquote>
    <div class="facts">${era.chips.map(c => `<span class="chip">${c}</span>`).join("")}</div>
  `;
  panelScene.innerHTML = scenes[era.id] + `<span class="scene-caption">${era.caption}</span>`;

  stage.classList.remove("swapping");
  void stage.offsetWidth;            // restart animation
  stage.classList.add("swapping");

  counter.textContent = `${current + 1} / ${eras.length} · ${era.year}`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === eras.length - 1;

  // keep active node in view
  nodes[current].scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
}

prevBtn.addEventListener("click", () => select(current - 1));
nextBtn.addEventListener("click", () => select(current + 1));
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") select(current + 1);
  if (e.key === "ArrowLeft") select(current - 1);
});

select(0);
</script>
</body>
</html>
